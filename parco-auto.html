<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parco Auto — A.G.S. Autodemolizioni</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root { --red:#E8001D; --navy:#1e2d4f; --bg:#f5f6f8; --white:#ffffff; --border:#e5e7eb; --text:#111827; --muted:#6b7280; }
*{ margin:0; padding:0; box-sizing:border-box; }
html{ scroll-behavior:smooth; }
body{ font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }

nav{ height:80px; display:flex; align-items:center; justify-content:space-between; padding:0 5vw; position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(255,255,255,0.97); backdrop-filter:blur(12px); border-bottom:1px solid var(--border); }
.logo-link{ display:flex; align-items:center; text-decoration:none; }
.logo-link img{ height:55px; width:auto; margin-left:3rem; margin-top:12px; }
nav ul{ display:flex; align-items:center; gap:2rem; list-style:none; }
nav ul a{ font-size:.875rem; font-weight:500; color:var(--muted); text-decoration:none; transition:color .2s; }
nav ul a:hover{ color:var(--text); }
.nav-cta{ background:var(--red)!important; color:#fff!important; padding:.55rem 1.3rem; border-radius:6px; font-weight:600!important; font-size:.825rem!important; }
.hamburger{ display:none; flex-direction:column; gap:5px; background:none; border:none; cursor:pointer; padding:4px; z-index:200; }
.hamburger span{ display:block; width:24px; height:2px; background:var(--text); border-radius:2px; transition:all .3s; }
.hamburger.open span:nth-child(1){ transform:translateY(7px) rotate(45deg); }
.hamburger.open span:nth-child(2){ opacity:0; }
.hamburger.open span:nth-child(3){ transform:translateY(-7px) rotate(-45deg); }

.search-hero-section{ margin-top:80px; background:var(--white); padding:2.5rem 0 2.5rem; border-bottom:1px solid var(--border); }
.search-hero-inner{ max-width:1100px; margin:0 auto; padding:0 5vw; }
.search-hero-section h1{ font-size:2rem; font-weight:800; color:var(--text); letter-spacing:-1px; margin-bottom:.4rem; }
.search-hero-section h1 span{ color:var(--red); }
.search-hero-section p{ font-size:.9rem; color:var(--muted); margin-bottom:2rem; }
.search-hero-bar{ display:flex; align-items:flex-end; gap:.8rem; }
.search-hero-group{ display:flex; flex-direction:column; gap:.4rem; flex:1; }
.search-hero-group label{ font-size:.78rem; font-weight:700; color:var(--text); padding-left:.2rem; }
.search-hero-field{ display:flex; align-items:center; gap:.6rem; background:var(--white); border:1.5px solid var(--border); border-radius:10px; padding:.7rem 1rem; height:44px; transition:border-color .2s; }
.search-hero-field:focus-within{ border-color:var(--navy); }
.search-hero-icon{ width:16px; height:16px; min-width:16px; flex-shrink:0; color:#9ca3af; }
.search-hero-field input, .search-hero-field select{ border:none; outline:none; font-family:'Inter',sans-serif; font-size:.88rem; color:var(--text); width:100%; background:transparent; }
.search-hero-field input::placeholder{ color:#9ca3af; }
.search-hero-btn{ background:var(--red); color:#fff; border:none; cursor:pointer; width:44px; height:44px; min-width:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .2s; align-self:flex-end; }
.search-hero-btn:hover{ background:#c8001a; }

.main{ max-width:1100px; margin:0 auto; padding:1.5rem 5vw 4rem; }
.results-bar{ display:flex; align-items:center; margin-bottom:1.2rem; }
.results-count{ font-size:.85rem; color:var(--muted); font-weight:500; }
.results-count span{ color:var(--text); font-weight:700; }

.car-list{ display:flex; flex-direction:column; gap:1.5rem; }

.car-card-wrap{ position:relative; }
.car-card{ background:var(--white); border:1px solid var(--border); border-radius:14px; overflow:hidden; transition:box-shadow .2s,transform .2s; position:relative; cursor:pointer; display:flex; padding:1rem; gap:1.2rem; }
.car-card:hover{ box-shadow:0 4px 20px rgba(0,0,0,0.09); transform:translateY(-1px); }
.car-card-link{ position:absolute; inset:0; z-index:1; }

.car-img-wrap{ flex:0 0 300px; position:relative; overflow:hidden; background:#f0f0f0; border-radius:10px; height:200px; }
.car-img-wrap img{ width:100%; height:100%; object-fit:cover; display:block; transition:transform .3s; }
.car-card:hover .car-img-wrap img{ transform:scale(1.03); }
.car-badge{ position:absolute; top:10px; left:10px; background:var(--red); color:#fff; font-size:.65rem; font-weight:700; padding:.25rem .6rem; border-radius:5px; text-transform:uppercase; letter-spacing:.5px; z-index:2; }

.car-content{ flex:1; display:flex; flex-direction:column; justify-content:space-between; min-width:0; }
.car-badge-green{ display:inline-block; background:#f0fdf4; color:#15803d; border:1.5px solid #86efac; font-size:.78rem; font-weight:700; padding:.3rem 1rem; border-radius:8px; margin-bottom:.7rem; }
.car-title{ font-size:1.2rem; font-weight:800; color:var(--text); letter-spacing:-.3px; margin-bottom:.2rem; }
.car-version{ font-size:.85rem; color:var(--muted); margin-bottom:1rem; }

.car-cta-btns{ display:flex; gap:.6rem; margin-bottom:1rem; position:relative; z-index:3; }
.btn-wa{ display:flex; align-items:center; justify-content:center; background:#25D366; color:#fff; font-family:'Inter',sans-serif; font-size:.85rem; font-weight:700; padding:.6rem 1.4rem; border-radius:8px; text-decoration:none; transition:background .2s; }
.btn-wa:hover{ background:#1aad52; }
.btn-call{ display:flex; align-items:center; justify-content:center; background:var(--white); color:var(--text); font-family:'Inter',sans-serif; font-size:.85rem; font-weight:600; padding:.6rem 1.4rem; border-radius:8px; text-decoration:none; border:1.5px solid var(--border); transition:border-color .2s; }
.btn-call:hover{ border-color:#9ca3af; }

.car-specs-bar{ display:flex; align-items:center; gap:.5rem; flex-wrap:wrap; }
.car-spec-item{ display:flex; align-items:center; gap:.35rem; font-size:.78rem; font-weight:500; color:#374151; background:#f3f4f6; padding:.3rem .7rem; border-radius:100px; white-space:nowrap; }
.car-spec-item svg{ width:13px; height:13px; flex-shrink:0; color:#6b7280; }

.car-arrow{ font-size:.78rem; font-weight:600; color:var(--red); margin-top:.6rem; display:inline-block; position:relative; z-index:3; }

.empty-state{ text-align:center; padding:4rem 2rem; color:var(--muted); }
.empty-state h3{ font-size:1.1rem; font-weight:700; color:var(--text); margin-bottom:.5rem; }

@media (max-width:900px){
  nav{ justify-content:center; position:relative; }
  .logo-link{ margin:0 auto; }
  .logo-link img{ margin-left:0; margin-top:0; height:65px; }
  .hamburger{ display:flex; position:absolute; right:1.5rem; top:50%; transform:translateY(-50%); }
  nav ul{ display:none; position:fixed; top:80px; left:0; right:0; background:#fff; flex-direction:column; gap:0; border-bottom:1px solid var(--border); box-shadow:0 4px 20px rgba(0,0,0,0.1); z-index:99; padding:.5rem 0; }
  nav ul.open{ display:flex; }
  nav ul a{ display:block; padding:1rem 2rem; font-size:1rem; border-bottom:1px solid var(--border); color:var(--text)!important; background:none!important; }
  .nav-cta{ margin:.8rem 2rem!important; border-radius:8px!important; text-align:center; display:block; }
  .search-hero-bar{ flex-direction:column; }
  .search-hero-group{ width:100%; }
  .search-hero-btn{ width:100%; border-radius:10px; }
  .car-card{ flex-direction:column; padding:.8rem; }
  .car-img-wrap{ flex:none; height:200px; width:100%; }
}
</style>
</head>
<body>

<nav>
  <a href="https://agsrottama.it" class="logo-link">
    <img src="assets/logoAGS.png" alt="A.G.S. Autodemolizioni">
  </a>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <ul id="nav-menu">
    <li><a href="https://agsrottama.it" onclick="closeMenu()">Home</a></li>
    <li><a href="https://agsrottama.it/servizi" onclick="closeMenu()">Servizi</a></li>
    <li><a href="https://agsrottama.it/come-funziona" onclick="closeMenu()">Come Funziona</a></li>
    <li><a href="https://agsrottama.it/contatti" onclick="closeMenu()">Contatti</a></li>
    <li><a href="https://agsrottama.it/#richiesta" class="nav-cta" onclick="closeMenu()">Demolisci Gratis</a></li>
  </ul>
</nav>

<div class="search-hero-section">
  <div class="search-hero-inner">
    <h1>Parco Auto <span>Disponibile</span></h1>
    <p>Veicoli in demolizione — disponibili per ricambi. Aggiornato quotidianamente</p>
    <div class="search-hero-bar">
      <div class="search-hero-group">
        <label>Cosa cerchi?</label>
        <div class="search-hero-field">
          <svg class="search-hero-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="Marca, modello..." oninput="filterCars()">
        </div>
      </div>
      <div class="search-hero-group">
        <label>Marca</label>
        <div class="search-hero-field">
          <svg class="search-hero-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 3v5h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
          <select id="filterMarca" onchange="filterCars()">
            <option value="">Tutte le marche</option>
          </select>
        </div>
      </div>
      <div class="search-hero-group">
        <label>Carburante</label>
        <div class="search-hero-field">
          <svg class="search-hero-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L6 12a6 6 0 0 0 12 0z"/></svg>
          <select id="filterCarburante" onchange="filterCars()">
            <option value="">Tutti</option>
            <option>Benzina</option><option>Diesel</option><option>GPL</option><option>Ibrido</option>
          </select>
        </div>
      </div>
      <button class="search-hero-btn" onclick="filterCars()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </div>
  </div>
</div>

<div class="main">
  <div class="results-bar">
    <div class="results-count" id="resultsCount"><span>0</span> veicoli disponibili</div>
  </div>
  <div class="car-list" id="carList"></div>
</div>

<script src="auto-db.js"></script>
<script>
const icoAnno = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/></svg>`;
const icoKm = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2C6.48 2 2 6.48 2 12"/><path d="M22 12c0-5.52-4.48-10-10-10"/><path d="M12 12l4-4"/><circle cx="12" cy="12" r="1" fill="currentColor"/></svg>`;
const icoCarb = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L6 12a6 6 0 0 0 12 0z"/></svg>`;
const icoCV = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`;

let AUTO_DB = [];

async function init() {
  AUTO_DB = await fetchAutoFromSupabase();
  var marche = [...new Set(AUTO_DB.map(a => a.marca).sort())];
  var sel = document.getElementById('filterMarca');
  marche.forEach(function(m){
    var opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    sel.appendChild(opt);
  });
  renderCars(AUTO_DB);
}

function renderCars(cars) {
  var list = document.getElementById('carList');
  list.innerHTML = '';
  if (cars.length === 0) {
    list.innerHTML = '<div class="empty-state"><h3>Nessun veicolo trovato</h3><p>Prova a modificare i filtri di ricerca</p></div>';
    document.getElementById('resultsCount').innerHTML = '<span>0</span> veicoli trovati';
    return;
  }
  cars.forEach(function(auto) {
    var foto = auto.foto[0] || 'assets/logoAGS.png';
    var waMsg = encodeURIComponent('Ciao, ho visto sul sito che avete una ' + auto.marca + ' ' + auto.modello + ' ' + auto.versione + ' del ' + auto.anno + '. Cerco: ');
    var card = document.createElement('div');
    card.className = 'car-card-wrap';
    card.innerHTML = `
      <div class="car-card">
        <a href="auto-dettaglio.html?id=${auto.id}" class="car-card-link"></a>
        <div class="car-img-wrap">
          <img src="${foto}" alt="${auto.marca} ${auto.modello}" onerror="this.src='assets/logoAGS.png'">
          <span class="car-badge">Disponibile</span>
        </div>
        <div class="car-content">
          <div>
            <span class="car-badge-green">Ricambi disponibili</span>
            <div class="car-title">${auto.marca} ${auto.modello}</div>
            <div class="car-version">${auto.versione}</div>
          </div>
          <div class="car-cta-btns">
            <a href="https://wa.me/393384672370?text=${waMsg}" target="_blank" class="btn-wa">WhatsApp</a>
            <a href="tel:0362306524" class="btn-call">Chiama</a>
          </div>
          <div class="car-specs-bar">
            ${auto.anno ? `<div class="car-spec-item">${icoAnno} ${auto.anno}</div>` : ''}
            ${auto.km ? `<div class="car-spec-item">${icoKm} ${auto.km} km</div>` : ''}
            ${auto.carburante ? `<div class="car-spec-item">${icoCarb} ${auto.carburante}</div>` : ''}
            ${auto.cv ? `<div class="car-spec-item">${icoCV} ${auto.cv} CV</div>` : ''}
          </div>
        </div>
      </div>
      <a href="auto-dettaglio.html?id=${auto.id}" class="car-arrow">Vedi dettagli →</a>`;
    list.appendChild(card);
  });
  document.getElementById('resultsCount').innerHTML = '<span>' + cars.length + '</span> veicol' + (cars.length === 1 ? 'o disponibile' : 'i disponibili');
}

function filterCars() {
  var search = document.getElementById('searchInput').value.toLowerCase();
  var marca = document.getElementById('filterMarca').value;
  var carburante = document.getElementById('filterCarburante').value;
  var filtered = AUTO_DB.filter(function(a) {
    var matchSearch = !search || (a.marca + ' ' + a.modello + ' ' + a.versione).toLowerCase().includes(search);
    var matchMarca = !marca || a.marca === marca;
    var matchCarburante = !carburante || a.carburante === carburante;
    return matchSearch && matchMarca && matchCarburante;
  });
  renderCars(filtered);
}

init();
</script>

<script>
function toggleMenu() { document.getElementById('hamburger').classList.toggle('open'); document.getElementById('nav-menu').classList.toggle('open'); }
function closeMenu() { document.getElementById('hamburger').classList.remove('open'); document.getElementById('nav-menu').classList.remove('open'); }
</script>
</body>
</html>
