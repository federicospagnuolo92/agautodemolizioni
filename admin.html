<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — A.G.S. Autodemolizioni</title>
  <link rel="icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon48.png">
  <link rel="icon" type="image/png" sizes="64x64" href="/favicon64.png">
  <link rel="apple-touch-icon" href="/favicon64.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
<style>
:root { --red:#E8001D; --bg:#f5f6f8; --white:#ffffff; --border:#e5e7eb; --text:#111827; --muted:#6b7280; }
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); }
#loginPage { display:flex; align-items:center; justify-content:center; min-height:100vh; }
.login-box { background:var(--white); border:1px solid var(--border); border-radius:16px; padding:2.5rem; width:100%; max-width:380px; }
.login-box h1 { font-size:1.4rem; font-weight:800; margin-bottom:.3rem; }
.login-box p { font-size:.85rem; color:var(--muted); margin-bottom:1.8rem; }
.field { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1rem; }
.field label { font-size:.75rem; font-weight:600; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
.field input, .field select { font-family:'Inter',sans-serif; font-size:.9rem; border:1.5px solid var(--border); border-radius:8px; padding:.7rem 1rem; outline:none; color:var(--text); }
.field input:focus, .field select:focus { border-color:var(--red); }
.btn-red { background:var(--red); color:#fff; font-family:'Inter',sans-serif; font-size:.95rem; font-weight:700; padding:.85rem; border-radius:10px; border:none; cursor:pointer; width:100%; margin-top:.5rem; }
.btn-red:hover { background:#c8001a; }
#adminPage { display:none; max-width:800px; margin:80px auto 0; padding:2rem 1.5rem 5rem; }
.admin-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:2rem; }
.admin-header h1 { font-size:1.5rem; font-weight:800; }
.btn-logout { font-family:'Inter',sans-serif; font-size:.8rem; font-weight:600; color:var(--muted); background:none; border:1.5px solid var(--border); border-radius:8px; padding:.4rem .9rem; cursor:pointer; }
.form-box { background:var(--white); border:1px solid var(--border); border-radius:14px; padding:1.8rem; margin-bottom:2rem; }
.form-box h2 { font-size:1rem; font-weight:700; margin-bottom:1.2rem; }
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
.form-grid .full { grid-column:1/-1; }
.btn-green { background:#16a34a; color:#fff; font-family:'Inter',sans-serif; font-size:.95rem; font-weight:700; padding:.85rem; border-radius:10px; border:none; cursor:pointer; width:100%; margin-top:1rem; }
.btn-green:hover { background:#15803d; }
.btn-orange { background:#ea580c; color:#fff; font-family:'Inter',sans-serif; font-size:.95rem; font-weight:700; padding:.85rem; border-radius:10px; border:none; cursor:pointer; width:100%; margin-top:.5rem; }
.btn-orange:hover { background:#c2410c; }
.btn-cancel { background:var(--bg); color:var(--muted); font-family:'Inter',sans-serif; font-size:.95rem; font-weight:700; padding:.85rem; border-radius:10px; border:1.5px solid var(--border); cursor:pointer; width:100%; margin-top:.5rem; }
.auto-item { background:var(--white); border:1px solid var(--border); border-radius:12px; padding:1.2rem 1.5rem; display:flex; align-items:center; gap:1rem; margin-bottom:.8rem; }
.auto-item img { width:80px; height:60px; object-fit:contain; border-radius:8px; background:#f8f9fa; flex-shrink:0; }
.auto-info { flex:1; }
.auto-info strong { font-size:.95rem; font-weight:700; }
.auto-info span { font-size:.8rem; color:var(--muted); display:block; }
.auto-actions { display:flex; gap:.5rem; flex-shrink:0; }
.btn-delete { background:#fee2e2; color:#dc2626; font-family:'Inter',sans-serif; font-size:.8rem; font-weight:700; border:none; border-radius:8px; padding:.5rem .9rem; cursor:pointer; }
.btn-delete:hover { background:#fecaca; }
.btn-edit { background:#eff6ff; color:#1d4ed8; font-family:'Inter',sans-serif; font-size:.8rem; font-weight:700; border:none; border-radius:8px; padding:.5rem .9rem; cursor:pointer; }
.btn-edit:hover { background:#dbeafe; }
.msg { font-size:.85rem; padding:.6rem 1rem; border-radius:8px; margin-top:.8rem; display:none; }
.msg.ok { background:#f0fdf4; color:#16a34a; }
.msg.err { background:#fee2e2; color:#dc2626; }
.search-bar { display:flex; gap:.8rem; margin-bottom:1rem; }
.search-bar input { font-family:'Inter',sans-serif; font-size:.85rem; border:1.5px solid var(--border); border-radius:8px; padding:.6rem 1rem; outline:none; flex:1; }
.search-bar input:focus { border-color:var(--red); }
.edit-mode-banner { background:#eff6ff; border:1.5px solid #93c5fd; border-radius:10px; padding:.8rem 1.2rem; margin-bottom:1rem; font-size:.85rem; color:#1d4ed8; font-weight:600; display:none; }
</style>
</head>
<body>

<nav>
  <a href="https://agsrottama.it" class="logo-link">
    <img src="assets/logoAGS.png" alt="A.G.S. Autodemolizioni">
  </a>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
  <ul id="nav-menu">
    <li><a href="https://agsrottama.it" onclick="closeMenu()">Home</a></li>
    <li><a href="parco-auto.html" onclick="closeMenu()">Parco Auto</a></li>
    <li><a href="https://agsrottama.it/contatti" onclick="closeMenu()">Contatti</a></li>
    <li><a href="https://agsrottama.it/#richiesta" class="nav-cta" onclick="closeMenu()">Demolisci Gratis</a></li>
  </ul>
</nav>

<div id="loginPage">
  <div class="login-box">
    <h1>🔐 Admin AGS</h1>
    <p>Accesso riservato</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pwdInput" placeholder="Inserisci la password" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-red" onclick="login()">Accedi</button>
    <div class="msg err" id="loginErr">Password errata</div>
  </div>
</div>

<div id="adminPage">
  <div class="admin-header">
    <h1>🚗 Gestione Parco Auto</h1>
    <button class="btn-logout" onclick="logout()">Esci</button>
  </div>

  <div class="form-box">
    <h2 id="formTitolo">➕ Aggiungi nuova auto</h2>
    <div class="edit-mode-banner" id="editBanner">✏️ Stai modificando un'auto esistente</div>
    <div class="form-grid">
      <div class="field"><label>Marca</label><input type="text" id="fMarca" placeholder="Es. Fiat"></div>
      <div class="field"><label>Modello</label><input type="text" id="fModello" placeholder="Es. Panda"></div>
      <div class="field full"><label>Versione</label><input type="text" id="fVersione" placeholder="Es. 1.2 8v Easy 5p"></div>
      <div class="field"><label>Anno</label><input type="number" id="fAnno" placeholder="Es. 2009"></div>
      <div class="field"><label>Chilometri</label><input type="number" id="fKm" placeholder="Es. 140000"></div>
      <div class="field">
        <label>Carburante</label>
        <select id="fCarburante">
          <option>Benzina</option><option>Diesel</option><option>GPL</option><option>Ibrido</option>
        </select>
      </div>
      <div class="field"><label>CV</label><input type="number" id="fCv" placeholder="Es. 69"></div>
      <div class="field full">
        <label>Foto (seleziona più foto tenendo Ctrl)</label>
        <input type="file" id="fFoto" accept="image/*" multiple onchange="previewFoto(this)">
        <div id="fotoPreviewContainer" style="display:flex;gap:8px;flex-wrap:wrap;margin-top:.5rem;"></div>
      </div>
    </div>
    <button class="btn-green" id="btnSalva" onclick="salva()">✅ Salva auto</button>
    <button class="btn-cancel" id="btnAnnulla" style="display:none" onclick="annullaModifica()">✖ Annulla modifica</button>
    <div class="msg ok" id="msgOk">Operazione completata!</div>
    <div class="msg err" id="msgErr">Errore — riprova</div>
  </div>

  <h2 id="titoloLista" style="font-size:1rem;font-weight:700;margin-bottom:.8rem;">Auto nel parco (0)</h2>
  <div class="search-bar">
    <input type="text" id="searchAdmin" placeholder="🔍 Cerca per marca o modello..." oninput="filtraLista()">
  </div>
  <div id="listaAuto"></div>
</div>

<script src="auto-db.js"></script>
<script>
const ADMIN_PWD = 'ags2024!';
let tutteLeAuto = [];
let editingId = null;

function login() {
  if (document.getElementById('pwdInput').value === ADMIN_PWD) {
    sessionStorage.setItem('ags_admin', '1');
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('adminPage').style.display = 'block';
    caricaAuto();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function logout() {
  sessionStorage.removeItem('ags_admin');
  location.reload();
}
